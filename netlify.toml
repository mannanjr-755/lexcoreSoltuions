[build]
  # netlify-build.mjs: generate → migrate (if DATABASE_URL valid) → next build
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=dev"
  # Neon cold-start retries during prisma migrate deploy
  PRISMA_MIGRATE_RETRIES = "6"
  PRISMA_MIGRATE_RETRY_DELAY_MS = "8000"

[[plugins]]
  package = "@netlify/plugin-nextjs"
